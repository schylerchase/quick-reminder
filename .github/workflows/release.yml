name: Release

on:
  push:
    tags:
      - "*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Verify tag matches manifest version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          node <<'NODE'
          const fs = require("fs");
          const tag = process.env.TAG_NAME;
          const version = JSON.parse(fs.readFileSync("manifest.json", "utf8")).version;

          if (tag !== version) {
            console.error(`Release tag "${tag}" does not match manifest.json version "${version}".`);
            process.exit(1);
          }

          console.log(`Release tag "${tag}" matches manifest.json version "${version}".`);
          NODE

      - name: Verify release assets
        run: |
          test -f main.js || { echo "::error file=main.js::main.js missing after build"; exit 1; }
          test -f manifest.json || { echo "::error file=manifest.json::manifest.json missing after build"; exit 1; }

      - name: Collect release assets
        id: assets
        run: |
          {
            echo "files<<EOF"
            echo "main.js"
            echo "manifest.json"
            if [ -f styles.css ]; then
              echo "styles.css"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: See the commit history for changes.
          prerelease: false
          draft: false
          files: ${{ steps.assets.outputs.files }}
          fail_on_unmatched_files: true
