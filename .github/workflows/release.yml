name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build release files
        run: npm run release:package

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          tag="$RELEASE_TAG"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/release/* dist/quick-reminder.zip --clobber
          else
            gh release create "$tag" dist/release/* dist/quick-reminder.zip --title "$tag" --notes "Quick Reminder $tag"
          fi
