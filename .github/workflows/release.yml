name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate release tag
        env:
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          node - <<'NODE'
          const fs = require("fs");
          const tag = process.env.RELEASE_TAG || "";
          const version = JSON.parse(fs.readFileSync("manifest.json", "utf8")).version;
          if (tag !== `v${version}`) {
            console.error(`Release tag ${tag} does not match manifest version v${version}.`);
            process.exit(1);
          }
          NODE

      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: Build release files
        run: npm run release:package

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          tag="$RELEASE_TAG"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/release/* dist/quick-reminder.zip --clobber
          else
            gh release create "$tag" dist/release/* dist/quick-reminder.zip --title "$tag" --notes "Quick Reminder $tag"
          fi
